<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhysikShow</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
    <div class="header-title">PhysikShow</div>

    <div class="header-controls">
        <select id="gymSelect"></select>

        <label class="switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>
    </div>
</header>

<main class="container">

    <section class="left">

        <div id="cards" class="grid"></div>

        <div class="filters">
            <span>Relatórios</span>

            <div class="segment" id="reportButtons"></div>

            <div class="report-config" id="reportConfig"></div>
        </div>

    </section>

    <section class="right" id="reportArea">
        Selecione um relatório
    </section>

</main>

<script type="module" src="js/app.js"></script>
</body>
</html>
